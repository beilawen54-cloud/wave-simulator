<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Wave Simulator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a1628;
  color: #c8d6e5;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

#controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 16px;
  background: #111d32;
  border-bottom: 1px solid #1e3a5f;
  align-items: center;
}

.slider-group {
  display: flex;
  flex-direction: column;
  min-width: 100px;
  flex: 1;
  max-width: 140px;
}

.slider-group label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #6b8db5;
  margin-bottom: 2px;
}

.slider-group input[type=range] {
  width: 100%;
  accent-color: #4dc9f6;
}

.slider-group .value {
  font-size: 10px;
  color: #8ab4d6;
  text-align: right;
}

#presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

#presets button {
  padding: 4px 10px;
  border: 1px solid #2a5a8a;
  border-radius: 4px;
  background: #152238;
  color: #8ab4d6;
  cursor: pointer;
  font-size: 11px;
  white-space: nowrap;
}

#presets button:hover {
  background: #1e3a5f;
  color: #c8d6e5;
}

#presets button.active {
  background: #1e4a6f;
  border-color: #4dc9f6;
  color: #4dc9f6;
}

canvas {
  flex: 1;
  display: block;
  cursor: crosshair;
}

#status {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 16px;
  background: #111d32;
  border-top: 1px solid #1e3a5f;
  font-size: 12px;
}

#stability-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #2ecc71;
}

#stability-text {
  color: #8ab4d6;
}
</style>
</head>
<body>

<div id="controls">
  <div class="slider-group">
    <label for="speed">Wave Speed <span class="value" id="val-speed">2.0</span></label>
    <input type="range" id="speed" min="0.1" max="5" step="0.1" value="2">
  </div>
  <div class="slider-group">
    <label for="amplitude">Amplitude <span class="value" id="val-amp">80</span></label>
    <input type="range" id="amplitude" min="0" max="200" step="1" value="80">
  </div>
  <div class="slider-group">
    <label for="damping">Damping <span class="value" id="val-damp">0.002</span></label>
    <input type="range" id="damping" min="0" max="0.1" step="0.001" value="0.002">
  </div>
  <div class="slider-group">
    <label for="dt">Time Step <span class="value" id="val-dt">0.016</span></label>
    <input type="range" id="dt" min="0.001" max="0.05" step="0.001" value="0.016">
  </div>
  <div class="slider-group">
    <label for="resolution">Grid Res <span class="value" id="val-res">400</span></label>
    <input type="range" id="resolution" min="100" max="800" step="10" value="400">
  </div>
  <div class="slider-group">
    <label for="shoreDepth">Shore Depth <span class="value" id="val-shore">0.3</span></label>
    <input type="range" id="shoreDepth" min="0" max="1" step="0.01" value="0.3">
  </div>
  <div class="slider-group">
    <label for="foamThreshold">Foam Thresh <span class="value" id="val-foam">0.15</span></label>
    <input type="range" id="foamThreshold" min="0.01" max="0.5" step="0.01" value="0.15">
  </div>
  <div id="presets">
    <button data-preset="calm">Calm Lagoon</button>
    <button data-preset="open">Open Sea</button>
    <button data-preset="storm">Storm Mode</button>
    <button data-preset="shore">Shoreline</button>
    <button data-preset="ripple">Ripple Mode</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="status">
  <div id="stability-dot"></div>
  <span id="stability-text">Stable — smooth sailing</span>
</div>

<script>
// ── DOM refs ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── Params ──
const params = {
  waveSpeed: 2.0,
  amplitude: 80,
  damping: 0.002,
  dt: 0.016,
  resolution: 400,
  shoreDepth: 0.3,
  foamThreshold: 0.15,
};

// ── Grid state ──
let N = params.resolution;
let dx = 1;
let uPrev = null;
let uCurr = null;
let uNext = null;

function initGrid() {
  N = params.resolution;
  dx = canvas.width / N;
  uPrev = new Float64Array(N + 2);
  uCurr = new Float64Array(N + 2);
  uNext = new Float64Array(N + 2);
  // Start with a sine wave pulse
  const cx = Math.floor(N / 2);
  const sigma = N / 20;
  for (let i = 0; i <= N + 1; i++) {
    const x = (i - cx) / sigma;
    uCurr[i] = params.amplitude * Math.exp(-x * x);
  }
  uPrev.set(uCurr);
}

// ── Shoreline / seabed ──
function seabedHeight(i) {
  // Seabed rises in the rightmost 25% of the grid
  const shoreStart = Math.floor(N * 0.75);
  if (i < shoreStart) return -9999; // deep water — never hits bottom
  const t = (i - shoreStart) / (N - shoreStart); // 0 at start, 1 at right edge
  const eased = 1 - Math.pow(1 - t, 3);
  return params.shoreDepth * 300 * eased; // max height controlled by shoreDepth slider
}

// ── Wave step ──
function waveStep() {
  const c = params.waveSpeed;
  const dt = params.dt;
  const r = c * dt / dx;
  const r2 = r * r;

  // Interior points: u_tt = c² u_xx
  for (let i = 1; i <= N; i++) {
    uNext[i] = 2 * uCurr[i] - uPrev[i]
      + r2 * (uCurr[i + 1] - 2 * uCurr[i] + uCurr[i - 1]);
  }

  // Damping and shallow-water effects
  const damp = 1 - params.damping;
  for (let i = 1; i <= N; i++) {
    const bedH = seabedHeight(i);

    // Shallow water: wave cannot go below seabed (only where seabed exists)
    if (bedH > 0 && uNext[i] < -bedH) {
      uNext[i] = -bedH;
    }

    // Increased damping in shallow water
    const shoreStart = Math.floor(N * 0.75);
    let localDamp = damp;
    if (i >= shoreStart) {
      const t = (i - shoreStart) / (N - shoreStart);
      const shallowDamp = 1 - (params.damping + t * 0.05); // stronger damping near shore
      localDamp = Math.max(0.85, shallowDamp);
    }

    uNext[i] *= localDamp;
  }

  // Boundary: reflective left, absorbing right (shoreline)
  uNext[0] = uNext[1];
  uNext[N + 1] = uNext[N] * 0.5;

  // Rotate buffers
  [uPrev, uCurr, uNext] = [uCurr, uNext, uPrev];
}

// ── Canvas sizing ──
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 160;
  initGrid();
}

window.addEventListener('resize', resize);
resize();
initGrid();

// ── Rendering ──
function lerpColor(a, b, t) {
  const ar = parseInt(a.slice(1,3), 16);
  const ag = parseInt(a.slice(3,5), 16);
  const ab = parseInt(a.slice(5,7), 16);
  const br = parseInt(b.slice(1,3), 16);
  const bg = parseInt(b.slice(3,5), 16);
  const bb = parseInt(b.slice(5,7), 16);
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const bl = Math.round(ab + (bb - ab) * t);
  return `rgb(${r},${g},${bl})`;
}

function draw() {
  const W = canvas.width;
  const H = canvas.height;
  const midY = H * 0.5;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#0d1b2a');
  skyGrad.addColorStop(0.4, '#1b3a5c');
  skyGrad.addColorStop(1, '#0a1628');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Subtle waterline at rest level
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, midY);
  ctx.lineTo(W, midY);
  ctx.stroke();

  // Draw seabed (sandy slope on the right)
  const shoreStartX = N * 0.75 * dx;
  ctx.beginPath();
  ctx.moveTo(shoreStartX, H);
  for (let i = Math.floor(N * 0.75); i <= N; i++) {
    const x = (i - 1) * dx;
    const bedY = midY - seabedHeight(i);
    ctx.lineTo(x, bedY);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = '#3d2b1f';
  ctx.fill();

  // Sandy highlight on seabed surface
  ctx.beginPath();
  ctx.moveTo(shoreStartX, midY - seabedHeight(Math.floor(N * 0.75)));
  for (let i = Math.floor(N * 0.75); i <= N; i++) {
    const x = (i - 1) * dx;
    const bedY = midY - seabedHeight(i);
    ctx.lineTo(x, bedY);
  }
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Build water fill path — top wave curve, then trace seabed
  ctx.beginPath();
  ctx.moveTo(0, midY + uCurr[1]);
  for (let i = 1; i <= N; i++) {
    const x = (i - 1) * dx;
    const y = midY + uCurr[i];
    ctx.lineTo(x, y);
  }
  // Always go downward from last wave point (prevents spike when wave is above seabed)
  ctx.lineTo(W, Math.max(midY + uCurr[N], midY - seabedHeight(N)));
  for (let i = N; i >= Math.floor(N * 0.75); i--) {
    const x = (i - 1) * dx;
    const bedY = midY - seabedHeight(i);
    const waveY = midY + uCurr[i];
    const fillY = Math.max(bedY, waveY);
    ctx.lineTo(x, fillY);
  }
  ctx.lineTo(0, H);
  ctx.closePath();

  // Vertical gradient fill
  const waterGrad = ctx.createLinearGradient(0, midY - params.amplitude, 0, H);
  waterGrad.addColorStop(0, '#1a6b8a');
  waterGrad.addColorStop(0.3, '#0e3d5c');
  waterGrad.addColorStop(1, '#051a2e');
  ctx.fillStyle = waterGrad;
  ctx.fill();

  // Draw the wave curve line itself
  ctx.beginPath();
  ctx.moveTo(0, midY + uCurr[1]);
  for (let i = 1; i <= N; i++) {
    const x = (i - 1) * dx;
    const y = midY + uCurr[i];
    ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#4dc9f6';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Crest highlights — lighter on peaks
  for (let i = 2; i < N; i++) {
    if (uCurr[i] > uCurr[i - 1] && uCurr[i] > uCurr[i + 1] && uCurr[i] > params.amplitude * 0.2) {
      const x = (i - 1) * dx;
      const y = midY + uCurr[i];
      const t = Math.min(1, uCurr[i] / params.amplitude);
      ctx.fillStyle = `rgba(180, 230, 255, ${0.3 + t * 0.5})`;
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ── Controls ──
const sliders = {
  speed:    { el: document.getElementById('speed'),    val: document.getElementById('val-speed') },
  amplitude:{ el: document.getElementById('amplitude'),val: document.getElementById('val-amp') },
  damping:  { el: document.getElementById('damping'),  val: document.getElementById('val-damp') },
  dt:       { el: document.getElementById('dt'),       val: document.getElementById('val-dt') },
  resolution:{el: document.getElementById('resolution'),val: document.getElementById('val-res') },
  shoreDepth:{el: document.getElementById('shoreDepth'),val: document.getElementById('val-shore') },
  foamThreshold:{el: document.getElementById('foamThreshold'),val: document.getElementById('val-foam') },
};

function readParams() {
  params.waveSpeed  = parseFloat(sliders.speed.el.value);
  params.amplitude  = parseFloat(sliders.amplitude.el.value);
  params.damping    = parseFloat(sliders.damping.el.value);
  params.dt         = parseFloat(sliders.dt.el.value);
  params.shoreDepth = parseFloat(sliders.shoreDepth.el.value);
  params.foamThreshold = parseFloat(sliders.foamThreshold.el.value);

  const newRes = parseInt(sliders.resolution.el.value);
  if (newRes !== params.resolution) {
    params.resolution = newRes;
    initGrid();
  }

  // Update displayed values
  sliders.speed.val.textContent = params.waveSpeed.toFixed(1);
  sliders.amplitude.val.textContent = params.amplitude;
  sliders.damping.val.textContent = params.damping.toFixed(3);
  sliders.dt.val.textContent = params.dt.toFixed(3);
  sliders.resolution.val.textContent = params.resolution;
  sliders.shoreDepth.val.textContent = params.shoreDepth.toFixed(2);
  sliders.foamThreshold.val.textContent = params.foamThreshold.toFixed(2);
  updateStability();
}

// ── Stability meter ──
const stabilityDot = document.getElementById('stability-dot');
const stabilityText = document.getElementById('stability-text');

function updateStability() {
  const r = params.waveSpeed * params.dt / dx;
  let color, text;

  if (r < 0.5) {
    color = '#2ecc71';
    text = 'Stable — smooth sailing';
  } else if (r < 1.0) {
    color = '#f39c12';
    text = 'Borderline — waves getting sharp';
  } else {
    color = '#e74c3c';
    text = 'Unstable — ocean is getting chaotic!';
  }

  stabilityDot.style.background = color;
  stabilityText.textContent = text + ` (r=${r.toFixed(3)})`;
}

Object.values(sliders).forEach(s => {
  s.el.addEventListener('input', readParams);
});

const PRESETS = {
  calm:   { speed: 0.8, amplitude: 40,  damping: 0.008, dt: 0.016, shoreDepth: 0.2, foamThreshold: 0.15 },
  open:   { speed: 2.0, amplitude: 80,  damping: 0.002, dt: 0.016, shoreDepth: 0.3, foamThreshold: 0.15 },
  storm:  { speed: 4.0, amplitude: 150, damping: 0.001, dt: 0.016, shoreDepth: 0.1, foamThreshold: 0.08 },
  shore:  { speed: 2.0, amplitude: 60,  damping: 0.005, dt: 0.016, shoreDepth: 0.6, foamThreshold: 0.10 },
  ripple: { speed: 1.5, amplitude: 50,  damping: 0.005, dt: 0.016, shoreDepth: 0.3, foamThreshold: 0.12 },
};

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;

  sliders.speed.el.value = p.speed;
  sliders.amplitude.el.value = p.amplitude;
  sliders.damping.el.value = p.damping;
  sliders.dt.el.value = p.dt;
  sliders.shoreDepth.el.value = p.shoreDepth;
  sliders.foamThreshold.el.value = p.foamThreshold;

  readParams();

  // Highlight active preset button
  document.querySelectorAll('#presets button').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-preset="${name}"]`).classList.add('active');
}

document.querySelectorAll('#presets button').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});

// Apply Open Sea as default
applyPreset('open');

// ── Click to ripple ──
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickI = Math.round(clickX / dx);

  if (clickI < 1 || clickI > N) return;

  const sigma = N / 30;
  for (let i = 1; i <= N; i++) {
    const dist = (i - clickI) / sigma;
    const bump = -params.amplitude * 0.7 * Math.exp(-dist * dist);
    uCurr[i] += bump;
    uPrev[i] += bump;
  }
});

// ── Foam particles ──
let foamParticles = [];

function spawnFoam(x, y, intensity) {
  const count = Math.floor(intensity * 8);
  for (let j = 0; j < count; j++) {
    foamParticles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + (Math.random() - 0.5) * 8,
      r: 1 + Math.random() * 3,
      life: 1.0,
      decay: 0.01 + Math.random() * 0.03,
      vy: -(0.5 + Math.random() * 1.5),
      vx: (Math.random() - 0.5) * 1.5,
    });
  }
}

function detectAndSpawnFoam() {
  for (let i = 2; i < N - 1; i++) {
    const steepness = Math.abs(uCurr[i + 1] - uCurr[i - 1]) / (2 * dx);
    if (steepness > params.foamThreshold && uCurr[i] > 10) {
      const x = (i - 1) * dx;
      const y = (canvas.height * 0.5) + uCurr[i];
      spawnFoam(x, y, steepness);
    }
  }
  if (foamParticles.length > 500) {
    foamParticles = foamParticles.slice(-500);
  }
}

function updateFoam() {
  for (let i = foamParticles.length - 1; i >= 0; i--) {
    const p = foamParticles[i];
    p.life -= p.decay;
    p.x += p.vx;
    p.y += p.vy;
    p.vy -= 0.02;
    if (p.life <= 0) {
      foamParticles.splice(i, 1);
    }
  }
}

function drawFoam() {
  for (const p of foamParticles) {
    ctx.fillStyle = `rgba(255, 255, 255, ${p.life * 0.8})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── Animation loop ──
function animate() {
  waveStep();
  detectAndSpawnFoam();
  updateFoam();
  draw();
  drawFoam();
  updateStability();
  requestAnimationFrame(animate);
}

// initial draw is handled inside animate()
animate();     // start loop
</script>
</body>
</html>
